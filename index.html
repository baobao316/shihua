<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>協會秘書知識庫</title>
  
  <!-- 引入 Tailwind CSS 確保版面與手機響應式設計 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {}
      }
    }
  </script>

  <!-- 引入 FontAwesome 圖示庫 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- 引入 React 與 ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- 引入 Babel 以在瀏覽器中直接編譯 React 語法 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 隱藏捲軸但可捲動，提升整體質感 */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    .dark ::-webkit-scrollbar-thumb {
      background: #475569;
    }
    
    /* 頁面切換的過場動畫 */
    .fade-in { animation: fadeIn 0.4s ease-in-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 font-sans transition-colors duration-200">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- 內部資料與選單結構 ---
    const DIRECTORIES = [
      { id: '01', name: '01－會務', icon: 'fa-solid fa-briefcase' },
      { id: '02', name: '02－報表', icon: 'fa-solid fa-folder' },
      { id: '04', name: '04－照片', icon: 'fa-solid fa-image' },
      { id: '06', name: '06－入會', icon: 'fa-solid fa-users' },
      { id: '07', name: '07－文件', icon: 'fa-solid fa-file-lines' },
    ];

    const QUICK_ACTIONS = [
      { id: 'board_meeting', title: '理監事聯席會', icon: 'fa-solid fa-users', color: 'bg-blue-100 text-blue-600 dark:bg-blue-900/50 dark:text-blue-400' },
      { id: 'new_member', title: '新增會員', icon: 'fa-solid fa-user-plus', color: 'bg-green-100 text-green-600 dark:bg-green-900/50 dark:text-green-400' },
      { id: 'insurance', title: '旅平險', icon: 'fa-solid fa-shield-halved', color: 'bg-purple-100 text-purple-600 dark:bg-purple-900/50 dark:text-purple-400' },
      { id: 'finance', title: '財務報表', icon: 'fa-solid fa-file-invoice-dollar', color: 'bg-yellow-100 text-yellow-600 dark:bg-yellow-900/50 dark:text-yellow-400' },
      { id: 'drive', title: '工作硬碟', icon: 'fa-solid fa-hard-drive', color: 'bg-gray-100 text-gray-600 dark:bg-gray-800 dark:text-gray-300' },
      { id: 'photos', title: '活動照片', icon: 'fa-solid fa-images', color: 'bg-pink-100 text-pink-600 dark:bg-pink-900/50 dark:text-pink-400' },
    ];

    const RECENT_DOCS = [
      { id: 'doc1', title: '第二次理監事聯席會', type: 'meeting', time: '2小時前', icon: 'fa-solid fa-users' },
      { id: 'doc2', title: '旅平險 SOP', type: 'sop', time: '昨天', icon: 'fa-solid fa-shield-halved' },
      { id: 'doc3', title: '會員大會簽到表', type: 'file', time: '3天前', icon: 'fa-solid fa-file-signature' },
      { id: 'doc4', title: '2025會員名冊', type: 'file', time: '上週', icon: 'fa-solid fa-address-book' },
    ];

    const CHECKLIST_ITEMS = [
      { id: 'c1', label: '財務報表', defaultChecked: false },
      { id: 'c2', label: 'PPT 簡報', defaultChecked: false },
      { id: 'c3', label: '簽到表', defaultChecked: false },
      { id: 'c4', label: '禮品表', defaultChecked: true },
      { id: 'c5', label: '筆記型電腦', defaultChecked: false },
      { id: 'c6', label: '抽獎券', defaultChecked: false },
      { id: 'c7', label: '抽獎箱', defaultChecked: false },
      { id: 'c8', label: '壽星蛋糕', defaultChecked: false },
    ];

    function App() {
      const [isDark, setIsDark] = useState(false);
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const [currentView, setCurrentView] = useState('home');
      const [searchQuery, setSearchQuery] = useState('');
      const [checklist, setChecklist] = useState(CHECKLIST_ITEMS);

      // 控制深色模式
      useEffect(() => {
        if (isDark) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      }, [isDark]);

      // 控制 Checklist 點擊打勾
      const toggleChecklist = (id) => {
        setChecklist(checklist.map(item => 
          item.id === id ? { ...item, defaultChecked: !item.defaultChecked } : item
        ));
      };

      // 呼叫列印/匯出 PDF 視窗
      const handlePrint = () => {
        window.print();
      };

      const Sidebar = () => (
        <React.Fragment>
          {/* 手機版的半透明遮罩 */}
          {sidebarOpen && (
            <div 
              className="fixed inset-0 bg-black/50 z-20 lg:hidden"
              onClick={() => setSidebarOpen(false)}
            />
          )}
          
          <div className={`fixed inset-y-0 left-0 z-30 w-64 bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 transform transition-transform duration-300 lg:translate-x-0 ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'} lg:static lg:block flex flex-col h-full shadow-lg lg:shadow-none`}>
            <div className="p-4 flex items-center justify-between">
              <div className="flex items-center space-x-3 font-bold text-lg text-gray-800 dark:text-gray-100">
                <div className="w-8 h-8 bg-blue-600 text-white rounded-lg flex items-center justify-center shadow-sm">
                  <i className="fa-solid fa-w"></i>
                </div>
                <span>協會知識庫</span>
              </div>
              <button className="lg:hidden p-2 text-gray-500 rounded-md hover:bg-gray-100 dark:hover:bg-gray-800" onClick={() => setSidebarOpen(false)}>
                <i className="fa-solid fa-xmark"></i>
              </button>
            </div>

            <div className="flex-1 overflow-y-auto py-4 px-3 space-y-6">
              <div>
                <p className="px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">主選單</p>
                <nav className="space-y-1">
                  <button 
                    onClick={() => { setCurrentView('home'); setSidebarOpen(false); }}
                    className={`w-full flex items-center px-3 py-2.5 text-sm font-medium rounded-md transition-colors ${currentView === 'home' ? 'bg-blue-50 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400' : 'text-gray-600 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-800/50'}`}
                  >
                    <i className="fa-solid fa-house w-5 text-center mr-2"></i> 首頁
                  </button>
                  <button className="w-full flex items-center px-3 py-2.5 text-sm font-medium rounded-md text-gray-600 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-800/50">
                    <i className="fa-solid fa-star w-5 text-center mr-2 text-yellow-500"></i> 收藏頁面
                  </button>
                </nav>
              </div>

              <div>
                <p className="px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">工作區分類</p>
                <nav className="space-y-1">
                  {DIRECTORIES.map(dir => (
                    <button key={dir.id} className="w-full flex items-center px-3 py-2.5 text-sm font-medium rounded-md text-gray-600 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-800/50 transition-colors">
                      <i className={`${dir.icon} w-5 text-center mr-2 text-gray-400 dark:text-gray-500`}></i>
                      {dir.name}
                    </button>
                  ))}
                </nav>
              </div>
            </div>

            <div className="p-4 border-t border-gray-200 dark:border-gray-800">
              <div className="flex items-center w-full">
                <div className="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 flex items-center justify-center text-white text-sm font-bold shadow-md">
                  蘇
                </div>
                <div className="ml-3 flex-1 overflow-hidden">
                  <p className="text-sm font-medium text-gray-700 dark:text-gray-200 truncate">蘇秘書</p>
                  <p className="text-xs text-gray-500 dark:text-gray-400 truncate">secretary@association.org</p>
                </div>
              </div>
            </div>
          </div>
        </React.Fragment>
      );

      const Header = () => (
        <header className="bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 sticky top-0 z-10 flex-shrink-0 print:hidden">
          <div className="flex items-center justify-between px-4 sm:px-6 lg:px-8 h-16">
            <div className="flex items-center flex-1">
              <button 
                className="lg:hidden p-2 -ml-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-md"
                onClick={() => setSidebarOpen(true)}
              >
                <i className="fa-solid fa-bars text-xl"></i>
              </button>
              
              <div className="ml-4 lg:ml-0 flex-1 max-w-lg">
                <div className="relative group">
                  <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i className="fa-solid fa-magnifying-glass text-gray-400 group-focus-within:text-blue-500 transition-colors"></i>
                  </div>
                  <input
                    type="text"
                    placeholder="全站搜尋（試著搜尋：旅平險）..."
                    className="block w-full pl-10 pr-3 py-2 border border-gray-200 dark:border-gray-700 rounded-lg leading-5 bg-gray-50 dark:bg-gray-800 text-gray-900 dark:text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent sm:text-sm transition-all shadow-sm"
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                  />
                </div>
              </div>
            </div>
            
            <div className="ml-4 flex items-center space-x-4">
              <button 
                onClick={() => setIsDark(!isDark)}
                className="w-10 h-10 flex items-center justify-center text-gray-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-800 rounded-full transition-colors"
                title="切換深淺色模式"
              >
                {isDark ? <i className="fa-solid fa-sun text-xl text-yellow-400"></i> : <i className="fa-solid fa-moon text-xl"></i>}
              </button>
            </div>
          </div>
        </header>
      );

      const HomeView = () => (
        <div className="max-w-5xl mx-auto space-y-8 fade-in">
          <div>
            <h1 className="text-3xl font-bold text-gray-900 dark:text-white flex items-center">
              👋 蘇秘書，歡迎回來
            </h1>
            <p className="mt-2 text-gray-600 dark:text-gray-400">今天是個處理會務的好日子。您需要找什麼？</p>
          </div>

          <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-4">
            {QUICK_ACTIONS.map(action => (
              <button 
                key={action.id}
                onClick={() => action.id === 'board_meeting' ? setCurrentView('board_meeting') : null}
                className="flex flex-col items-center justify-center p-4 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl hover:shadow-md transition-all hover:-translate-y-1 hover:border-blue-300 dark:hover:border-blue-600 group"
              >
                <div className={`w-12 h-12 rounded-xl flex items-center justify-center mb-3 ${action.color}`}>
                  <i className={`${action.icon} text-xl`}></i>
                </div>
                <span className="text-sm font-medium text-gray-800 dark:text-gray-200 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">
                  {action.title}
                </span>
              </button>
            ))}
          </div>

          <div className="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 overflow-hidden shadow-sm">
            <div className="px-6 py-4 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between bg-gray-50/50 dark:bg-gray-800/50">
              <h2 className="text-lg font-semibold text-gray-900 dark:text-white flex items-center">
                <i className="fa-solid fa-star mr-2 text-yellow-500"></i>
                最近常用與收藏
              </h2>
            </div>
            <ul className="divide-y divide-gray-100 dark:divide-gray-800">
              {RECENT_DOCS.map((doc, idx) => (
                <li key={idx} className="px-6 py-4 hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors cursor-pointer flex items-center justify-between group">
                  <div className="flex items-center">
                    <i className={`${doc.icon} w-5 text-center text-gray-400 mr-3 group-hover:text-blue-500 transition-colors`}></i>
                    <span className="text-sm font-medium text-gray-700 dark:text-gray-300 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">{doc.title}</span>
                  </div>
                  <div className="flex items-center text-sm text-gray-400">
                    <i className="fa-regular fa-clock mr-1.5"></i>
                    {doc.time}
                  </div>
                </li>
              ))}
            </ul>
          </div>
        </div>
      );

      const BoardMeetingView = () => {
        const modules = [
          { id: 'sop', title: '標準作業流程 (SOP)', icon: 'fa-solid fa-file-lines', desc: '會議前中後完整流程與規範', color: 'text-blue-500' },
          { id: 'checklist', title: '攜帶清單 (Checklist)', icon: 'fa-regular fa-square-check', desc: '每次開會必備物品確認表', color: 'text-green-500' },
          { id: 'finance', title: '財務報表', icon: 'fa-solid fa-file-invoice-dollar', desc: '本期與歷年財務報表彙整', color: 'text-yellow-500' },
          { id: 'ppt', title: '簡報 (PPT)', icon: 'fa-solid fa-file-image', desc: '會議用公版與歷次簡報', color: 'text-purple-500' },
          { id: 'report', title: '會務報告', icon: 'fa-solid fa-file-word', desc: '秘書處會務報告草稿與定稿', color: 'text-indigo-500' },
          { id: 'minutes', title: '會議紀錄', icon: 'fa-solid fa-clock-rotate-left', desc: '歷次理監事會議紀錄存檔', color: 'text-gray-500' },
        ];

        return (
          <div className="max-w-5xl mx-auto fade-in">
            <div className="flex items-center text-sm text-gray-500 mb-6">
              <button onClick={() => setCurrentView('home')} className="hover:text-gray-900 dark:hover:text-white transition-colors">首頁</button>
              <i className="fa-solid fa-chevron-right text-xs mx-2"></i>
              <span className="text-gray-900 dark:text-white font-medium">理監事聯席會</span>
            </div>

            <div className="flex items-center justify-between mb-8">
              <div>
                <h1 className="text-3xl font-bold text-gray-900 dark:text-white flex items-center">
                  <span className="bg-blue-100 text-blue-600 dark:bg-blue-900 dark:text-blue-300 w-12 h-12 flex items-center justify-center rounded-xl mr-4 shadow-sm">
                    <i className="fa-solid fa-users text-xl"></i>
                  </span>
                  理監事聯席會
                </h1>
                <p className="mt-3 text-gray-600 dark:text-gray-400">管理所有與理監事聯席會相關的籌備、文件與紀錄。</p>
              </div>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
              {modules.map(mod => (
                <div 
                  key={mod.id} 
                  onClick={() => {
                    if (mod.id === 'checklist') setCurrentView('checklist');
                    if (mod.id === 'sop') setCurrentView('sop');
                  }}
                  className="bg-white dark:bg-gray-800 rounded-2xl p-6 border border-gray-200 dark:border-gray-700 hover:border-blue-400 dark:hover:border-blue-600 hover:shadow-lg transition-all cursor-pointer group"
                >
                  <div className="w-12 h-12 rounded-xl bg-gray-50 dark:bg-gray-700 flex items-center justify-center group-hover:bg-blue-50 dark:group-hover:bg-blue-900/50 transition-colors mb-4">
                    <i className={`${mod.icon} text-2xl ${mod.color}`}></i>
                  </div>
                  <h3 className="text-lg font-semibold text-gray-900 dark:text-white mb-2">{mod.title}</h3>
                  <p className="text-sm text-gray-500 dark:text-gray-400">{mod.desc}</p>
                </div>
              ))}
            </div>
          </div>
        );
      };

      const ChecklistView = () => (
        <div className="max-w-3xl mx-auto fade-in pb-20">
          <div className="flex items-center text-sm text-gray-500 mb-6 print:hidden">
            <button onClick={() => setCurrentView('home')} className="hover:text-gray-900 dark:hover:text-white">首頁</button>
            <i className="fa-solid fa-chevron-right text-xs mx-2"></i>
            <button onClick={() => setCurrentView('board_meeting')} className="hover:text-gray-900 dark:hover:text-white">理監事聯席會</button>
            <i className="fa-solid fa-chevron-right text-xs mx-2"></i>
            <span className="text-gray-900 dark:text-white font-medium">攜帶清單</span>
          </div>

          <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden">
            <div className="px-6 sm:px-8 py-6 border-b border-gray-200 dark:border-gray-700 bg-gray-50/50 dark:bg-gray-800/50 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4">
              <div>
                <h1 className="text-2xl font-bold text-gray-900 dark:text-white flex items-center">
                  <i className="fa-regular fa-square-check mr-3 text-green-500"></i>
                  會議攜帶 Checklist
                </h1>
                <p className="mt-1 text-sm text-gray-500 dark:text-gray-400">出發前往會場前，請確實勾選確認已準備妥當。</p>
              </div>
              <button 
                onClick={handlePrint}
                className="flex items-center justify-center px-4 py-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg text-sm font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors shadow-sm print:hidden w-full sm:w-auto"
              >
                <i className="fa-solid fa-download mr-2"></i> 列印 / PDF
              </button>
            </div>
            
            <div className="p-6 sm:p-8">
              <div className="space-y-3">
                {checklist.map(item => (
                  <label 
                    key={item.id} 
                    className={`flex items-center p-4 rounded-xl border-2 cursor-pointer transition-all select-none ${
                      item.defaultChecked 
                        ? 'border-green-500 bg-green-50 dark:bg-green-900/20 dark:border-green-600' 
                        : 'border-gray-100 hover:border-blue-300 bg-white dark:bg-gray-800 dark:border-gray-700 dark:hover:border-gray-500'
                    }`}
                  >
                    <div className="relative flex items-center justify-center w-6 h-6 mr-4">
                      <input
                        type="checkbox"
                        className="w-6 h-6 rounded-md border-gray-300 text-green-600 focus:ring-green-500 dark:border-gray-600 dark:bg-gray-700 cursor-pointer"
                        checked={item.defaultChecked}
                        onChange={() => toggleChecklist(item.id)}
                      />
                    </div>
                    <div className="text-lg">
                      <span className={`font-medium transition-colors ${item.defaultChecked ? 'text-green-800 dark:text-green-400 line-through opacity-70' : 'text-gray-900 dark:text-gray-100'}`}>
                        {item.label}
                      </span>
                    </div>
                  </label>
                ))}
              </div>
            </div>
          </div>
        </div>
      );

      const SOPView = () => (
        <div className="max-w-4xl mx-auto fade-in pb-20">
          <div className="flex items-center text-sm text-gray-500 mb-6 print:hidden">
            <button onClick={() => setCurrentView('home')} className="hover:text-gray-900 dark:hover:text-white">首頁</button>
            <i className="fa-solid fa-chevron-right text-xs mx-2"></i>
            <button onClick={() => setCurrentView('board_meeting')} className="hover:text-gray-900 dark:hover:text-white">理監事聯席會</button>
            <i className="fa-solid fa-chevron-right text-xs mx-2"></i>
            <span className="text-gray-900 dark:text-white font-medium">標準作業流程</span>
          </div>

          <article className="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 p-6 sm:p-12 relative">
            <div className="absolute top-6 right-6 sm:top-8 sm:right-8 flex space-x-2 print:hidden">
               <button 
                onClick={handlePrint}
                className="w-10 h-10 flex items-center justify-center text-gray-500 hover:text-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700 dark:hover:text-gray-300 rounded-lg transition-colors border border-transparent hover:border-gray-200 dark:hover:border-gray-600"
                title="列印或匯出PDF"
              >
                <i className="fa-solid fa-print text-lg"></i>
              </button>
            </div>

            <h1 className="text-3xl sm:text-4xl font-extrabold text-gray-900 dark:text-white mb-4 pr-12">理監事聯席會 SOP</h1>
            
            <div className="flex flex-wrap items-center gap-4 mb-8 text-sm text-gray-500 dark:text-gray-400 border-b border-gray-100 dark:border-gray-700 pb-6">
              <div className="flex items-center">
                <div className="w-6 h-6 rounded-full bg-blue-500 text-white flex items-center justify-center mr-2 text-xs font-bold shadow-sm">蘇</div>
                最後更新：2026/07/06
              </div>
              <div className="flex items-center text-green-700 dark:text-green-400 bg-green-100 dark:bg-green-900/40 px-3 py-1 rounded-full font-medium text-xs">
                <i className="fa-solid fa-circle-check mr-1.5"></i> 已核准定稿
              </div>
            </div>

            <div className="space-y-8 text-base leading-relaxed">
              <section>
                <h2 className="text-2xl font-bold text-gray-800 dark:text-gray-100 border-l-4 border-blue-500 pl-4 mb-4">一、 會前準備 (14天前)</h2>
                <ul className="list-none space-y-3 text-gray-700 dark:text-gray-300 ml-2">
                  <li className="flex items-start"><i className="fa-solid fa-caret-right text-blue-500 mt-1 mr-3"></i> <span>確認開會日期與地點（通常於公會會議室）。</span></li>
                  <li className="flex items-start"><i className="fa-solid fa-caret-right text-blue-500 mt-1 mr-3"></i> <span>發送開會通知單給所有理監事（包含 Email 與 LINE 群組通知）。</span></li>
                  <li className="flex items-start"><i className="fa-solid fa-caret-right text-blue-500 mt-1 mr-3"></i> <span>確認餐盒或茶點的訂購數量（需統計吃素人數）。</span></li>
                </ul>
              </section>

              <div className="bg-blue-50 dark:bg-blue-900/20 rounded-xl p-5 border border-blue-100 dark:border-blue-800/50 shadow-sm">
                <h4 className="font-bold text-blue-800 dark:text-blue-300 flex items-center mb-2">
                  <i className="fa-regular fa-lightbulb text-xl mr-2 text-yellow-500"></i> 秘書處小提醒
                </h4>
                <p className="text-blue-700 dark:text-blue-400/90 m-0 text-sm sm:text-base">
                  發送通知後，務必在 <strong>3天內</strong> 追蹤尚未回覆出席狀況的理監事，確保人數達法定開會標準（過半數）。
                </p>
              </div>

              <section>
                <h2 className="text-2xl font-bold text-gray-800 dark:text-gray-100 border-l-4 border-blue-500 pl-4 mb-4">二、 會場佈置範例</h2>
                <p className="text-gray-700 dark:text-gray-300 mb-4 ml-2">
                  桌牌擺放順序：理事長居中，常務理事與常務監事居兩側，接著依序擺放。投影機與麥克風需於會議前30分鐘測試完畢。
                </p>
                
                <div className="w-full aspect-video sm:h-72 bg-gray-100 dark:bg-gray-700 rounded-xl flex flex-col items-center justify-center border-2 border-dashed border-gray-300 dark:border-gray-600 shadow-inner group cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors">
                  <i className="fa-regular fa-image text-4xl text-gray-400 group-hover:text-blue-400 transition-colors mb-3"></i>
                  <span className="text-gray-500 dark:text-gray-400 font-medium">點擊上傳 / 會場桌牌擺放範例圖.jpg</span>
                </div>
              </section>

              <section>
                <h2 className="text-2xl font-bold text-gray-800 dark:text-gray-100 border-l-4 border-blue-500 pl-4 mb-4">三、 會後工作 (3天內)</h2>
                <ul className="list-none space-y-3 text-gray-700 dark:text-gray-300 ml-2">
                  <li className="flex items-start"><i className="fa-solid fa-check text-green-500 mt-1 mr-3"></i> <span>整理會議紀錄，交由理事長簽核。</span></li>
                  <li className="flex items-start"><i className="fa-solid fa-check text-green-500 mt-1 mr-3"></i> <span>將決議事項發佈至協會網站公告區。</span></li>
                  <li className="flex items-start"><i className="fa-solid fa-check text-green-500 mt-1 mr-3"></i> <span>請款：結算餐盒、場地費等相關開銷，將發票交給財務。</span></li>
                </ul>
              </section>
            </div>
          </article>
        </div>
      );

      return (
        <div className="flex h-screen bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 font-sans overflow-hidden transition-colors duration-200 selection:bg-blue-200 selection:text-blue-900">
          <Sidebar />
          
          <div className="flex-1 flex flex-col min-w-0 overflow-hidden relative">
            <Header />
            
            <main className="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 scroll-smooth">
              {/* 全站搜尋模擬結果 */}
              {searchQuery && searchQuery.includes('旅平險') ? (
                <div className="max-w-3xl mx-auto fade-in">
                  <h2 className="text-xl font-bold mb-4">搜尋結果："{searchQuery}"</h2>
                  <div 
                    className="bg-white dark:bg-gray-800 p-5 rounded-xl border border-gray-200 dark:border-gray-700 cursor-pointer hover:border-blue-500 dark:hover:border-blue-500 shadow-sm transition-all hover:-translate-y-0.5"
                    onClick={() => { setSearchQuery(''); setCurrentView('sop'); }}
                  >
                    <div className="flex items-center text-blue-600 dark:text-blue-400 mb-2 text-lg">
                      <i className="fa-solid fa-shield-halved mr-2"></i>
                      <span className="font-bold">旅平險投保 SOP</span>
                    </div>
                    <p className="text-sm text-gray-600 dark:text-gray-400 mb-3 line-clamp-2">...將名冊匯出後，登入保險公司後台上傳檔案，確認金額無誤後刷卡結帳，並務必將保單影本存入【07-文件】資料夾中備查...</p>
                    <div className="flex space-x-2 text-xs font-medium text-gray-500 dark:text-gray-400">
                      <span className="bg-gray-100 dark:bg-gray-700 px-2.5 py-1 rounded-md">會務</span>
                      <span className="bg-gray-100 dark:bg-gray-700 px-2.5 py-1 rounded-md">保險</span>
                    </div>
                  </div>
                </div>
              ) : (
                <React.Fragment>
                  {currentView === 'home' && <HomeView />}
                  {currentView === 'board_meeting' && <BoardMeetingView />}
                  {currentView === 'checklist' && <ChecklistView />}
                  {currentView === 'sop' && <SOPView />}
                </React.Fragment>
              )}
            </main>
          </div>
        </div>
      );
    }

    // 將 React 應用程式掛載到畫面中
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
