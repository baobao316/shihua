<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>協會秘書知識庫</title>
  
  <!-- 引入 Tailwind CSS 確保版面與手機響應式設計 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {}
      }
    }
  </script>

  <!-- 引入 FontAwesome 圖示庫 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- 引入 React 與 ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- 引入 Babel 以在瀏覽器中直接編譯 React 語法 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 隱藏捲軸但可捲動，提升整體質感 */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    .dark ::-webkit-scrollbar-thumb {
      background: #475569;
    }
    
    /* 頁面切換的過場動畫 */
    .fade-in { animation: fadeIn 0.4s ease-in-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 font-sans transition-colors duration-200">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- 內部資料與選單結構 ---
    const DIRECTORIES = [
      { id: '01', name: '01－會務', icon: 'fa-solid fa-briefcase' },
      { id: '02', name: '02－報表', icon: 'fa-solid fa-folder' },
      { id: '04', name: '04－照片', icon: 'fa-solid fa-image' },
      { id: '06', name: '06－入會', icon: 'fa-solid fa-users' },
      { id: '07', name: '07－文件', icon: 'fa-solid fa-file-lines' },
    ];

    const QUICK_ACTIONS = [
      { id: 'core_concepts', title: '核心觀念(必讀)', icon: 'fa-solid fa-book-open', color: 'bg-indigo-100 text-indigo-600 dark:bg-indigo-900/50 dark:text-indigo-400' },
      { id: 'board_meeting_sop', title: '理監事 SOP', icon: 'fa-solid fa-users-gear', color: 'bg-blue-100 text-blue-600 dark:bg-blue-900/50 dark:text-blue-400' },
      { id: 'new_member', title: '新增會員 SOP', icon: 'fa-solid fa-user-plus', color: 'bg-green-100 text-green-600 dark:bg-green-900/50 dark:text-green-400' },
      { id: 'insurance', title: '旅平險 SOP', icon: 'fa-solid fa-shield-halved', color: 'bg-purple-100 text-purple-600 dark:bg-purple-900/50 dark:text-purple-400' },
      { id: 'handover', title: '友會交接 SOP', icon: 'fa-solid fa-handshake', color: 'bg-yellow-100 text-yellow-600 dark:bg-yellow-900/50 dark:text-yellow-400' },
      { id: 'board_meeting_checklist', title: '出門 Checklist', icon: 'fa-solid fa-list-check', color: 'bg-orange-100 text-orange-600 dark:bg-orange-900/50 dark:text-orange-400' },
    ];

    const RECENT_DOCS = [
      { id: 'core_concepts', title: '工作核心觀念與工具', type: 'sop', time: '剛剛', icon: 'fa-solid fa-book-open' },
      { id: 'board_meeting_sop', title: '理監事聯席會 SOP', type: 'sop', time: '2小時前', icon: 'fa-solid fa-users-gear' },
      { id: 'insurance', title: '旅遊平安險 SOP', type: 'sop', time: '昨天', icon: 'fa-solid fa-shield-halved' },
      { id: 'new_member', title: '新增會員 SOP', type: 'sop', time: '3天前', icon: 'fa-solid fa-user-plus' },
    ];

    // 依據手冊更新的 Checklist
    const CHECKLIST_ITEMS = [
      { id: 'c1', label: '筆記型電腦 (可播放 PPT)', defaultChecked: false },
      { id: 'c2', label: '三長簽到表', defaultChecked: false },
      { id: 'c3', label: '六組簽到表', defaultChecked: false },
      { id: 'c4', label: '來賓簽到表 (如有活動)', defaultChecked: false },
      { id: 'c5', label: '禮品領取表', defaultChecked: false },
      { id: 'c6', label: '紅色抽獎券', defaultChecked: false },
      { id: 'c7', label: '黃色抽獎券', defaultChecked: false },
      { id: 'c8', label: '抽獎箱', defaultChecked: false },
      { id: 'c9', label: '手寫板 10 個', defaultChecked: false },
    ];

    function App() {
      const [isDark, setIsDark] = useState(false);
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const [currentView, setCurrentView] = useState('home');
      const [searchQuery, setSearchQuery] = useState('');
      const [checklist, setChecklist] = useState(CHECKLIST_ITEMS);

      useEffect(() => {
        if (isDark) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      }, [isDark]);

      const toggleChecklist = (id) => {
        setChecklist(checklist.map(item => 
          item.id === id ? { ...item, defaultChecked: !item.defaultChecked } : item
        ));
      };

      const handlePrint = () => {
        window.print();
      };

      const Sidebar = () => (
        <React.Fragment>
          {sidebarOpen && (
            <div 
              className="fixed inset-0 bg-black/50 z-20 lg:hidden"
              onClick={() => setSidebarOpen(false)}
            />
          )}
          
          <div className={`fixed inset-y-0 left-0 z-30 w-64 bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 transform transition-transform duration-300 lg:translate-x-0 ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'} lg:static lg:block flex flex-col h-full shadow-lg lg:shadow-none`}>
            <div className="p-4 flex items-center justify-between">
              <div className="flex items-center space-x-3 font-bold text-lg text-gray-800 dark:text-gray-100">
                <div className="w-8 h-8 bg-blue-600 text-white rounded-lg flex items-center justify-center shadow-sm">
                  <i className="fa-solid fa-book-bookmark"></i>
                </div>
                <span>協會知識庫</span>
              </div>
              <button className="lg:hidden p-2 text-gray-500 rounded-md hover:bg-gray-100 dark:hover:bg-gray-800" onClick={() => setSidebarOpen(false)}>
                <i className="fa-solid fa-xmark"></i>
              </button>
            </div>

            <div className="flex-1 overflow-y-auto py-4 px-3 space-y-6">
              <div>
                <p className="px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">主選單</p>
                <nav className="space-y-1">
                  <button 
                    onClick={() => { setCurrentView('home'); setSidebarOpen(false); }}
                    className={`w-full flex items-center px-3 py-2.5 text-sm font-medium rounded-md transition-colors ${currentView === 'home' ? 'bg-blue-50 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400' : 'text-gray-600 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-800/50'}`}
                  >
                    <i className="fa-solid fa-house w-5 text-center mr-2"></i> 首頁 Dashboard
                  </button>
                  <button 
                    onClick={() => { setCurrentView('core_concepts'); setSidebarOpen(false); }}
                    className={`w-full flex items-center px-3 py-2.5 text-sm font-medium rounded-md transition-colors ${currentView === 'core_concepts' ? 'bg-indigo-50 text-indigo-700 dark:bg-indigo-900/30 dark:text-indigo-400' : 'text-gray-600 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-800/50'}`}
                  >
                    <i className="fa-solid fa-lightbulb w-5 text-center mr-2 text-indigo-500"></i> 新手入門必讀
                  </button>
                </nav>
              </div>

              <div>
                <p className="px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">SOP 手冊</p>
                <nav className="space-y-1">
                  <button onClick={() => { setCurrentView('board_meeting_sop'); setSidebarOpen(false); }} className={`w-full flex items-center px-3 py-2.5 text-sm font-medium rounded-md transition-colors ${currentView === 'board_meeting_sop' ? 'bg-gray-100 dark:bg-gray-800 text-gray-900 dark:text-white' : 'text-gray-600 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-800/50'}`}>
                    <i className="fa-solid fa-users-gear w-5 text-center mr-2 text-gray-400"></i> 理監事聯席會
                  </button>
                  <button onClick={() => { setCurrentView('insurance'); setSidebarOpen(false); }} className={`w-full flex items-center px-3 py-2.5 text-sm font-medium rounded-md transition-colors ${currentView === 'insurance' ? 'bg-gray-100 dark:bg-gray-800 text-gray-900 dark:text-white' : 'text-gray-600 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-800/50'}`}>
                    <i className="fa-solid fa-shield-halved w-5 text-center mr-2 text-gray-400"></i> 旅遊平安險
                  </button>
                  <button onClick={() => { setCurrentView('new_member'); setSidebarOpen(false); }} className={`w-full flex items-center px-3 py-2.5 text-sm font-medium rounded-md transition-colors ${currentView === 'new_member' ? 'bg-gray-100 dark:bg-gray-800 text-gray-900 dark:text-white' : 'text-gray-600 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-800/50'}`}>
                    <i className="fa-solid fa-user-plus w-5 text-center mr-2 text-gray-400"></i> 新增會員
                  </button>
                  <button onClick={() => { setCurrentView('handover'); setSidebarOpen(false); }} className={`w-full flex items-center px-3 py-2.5 text-sm font-medium rounded-md transition-colors ${currentView === 'handover' ? 'bg-gray-100 dark:bg-gray-800 text-gray-900 dark:text-white' : 'text-gray-600 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-800/50'}`}>
                    <i className="fa-solid fa-handshake w-5 text-center mr-2 text-gray-400"></i> 友會交接
                  </button>
                </nav>
              </div>

              <div>
                <p className="px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">硬碟資料夾 (唯讀)</p>
                <nav className="space-y-1">
                  {DIRECTORIES.map(dir => (
                    <button key={dir.id} className="w-full flex items-center px-3 py-2.5 text-sm font-medium rounded-md text-gray-500 hover:bg-gray-50 dark:text-gray-500 dark:hover:bg-gray-800/30 transition-colors cursor-not-allowed">
                      <i className={`${dir.icon} w-5 text-center mr-2 opacity-50`}></i>
                      {dir.name}
                    </button>
                  ))}
                </nav>
              </div>
            </div>

            <div className="p-4 border-t border-gray-200 dark:border-gray-800">
              <div className="flex items-center w-full">
                <div className="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 flex items-center justify-center text-white text-sm font-bold shadow-md">
                  蘇
                </div>
                <div className="ml-3 flex-1 overflow-hidden">
                  <p className="text-sm font-medium text-gray-700 dark:text-gray-200 truncate">蘇秘書</p>
                  <p className="text-xs text-gray-500 dark:text-gray-400 truncate">V1.0 持續更新中</p>
                </div>
              </div>
            </div>
          </div>
        </React.Fragment>
      );

      const Header = () => (
        <header className="bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 sticky top-0 z-10 flex-shrink-0 print:hidden">
          <div className="flex items-center justify-between px-4 sm:px-6 lg:px-8 h-16">
            <div className="flex items-center flex-1">
              <button 
                className="lg:hidden p-2 -ml-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-md"
                onClick={() => setSidebarOpen(true)}
              >
                <i className="fa-solid fa-bars text-xl"></i>
              </button>
              
              <div className="ml-4 lg:ml-0 flex-1 max-w-lg">
                <div className="relative group">
                  <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i className="fa-solid fa-magnifying-glass text-gray-400 group-focus-within:text-blue-500 transition-colors"></i>
                  </div>
                  <input
                    type="text"
                    placeholder="全站搜尋（輸入：旅平險）..."
                    className="block w-full pl-10 pr-3 py-2 border border-gray-200 dark:border-gray-700 rounded-lg leading-5 bg-gray-50 dark:bg-gray-800 text-gray-900 dark:text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent sm:text-sm transition-all shadow-sm"
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                  />
                </div>
              </div>
            </div>
            
            <div className="ml-4 flex items-center space-x-4">
              <button 
                onClick={() => setIsDark(!isDark)}
                className="w-10 h-10 flex items-center justify-center text-gray-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-800 rounded-full transition-colors"
                title="切換深淺色模式"
              >
                {isDark ? <i className="fa-solid fa-sun text-xl text-yellow-400"></i> : <i className="fa-solid fa-moon text-xl"></i>}
              </button>
            </div>
          </div>
        </header>
      );

      const HomeView = () => (
        <div className="max-w-5xl mx-auto space-y-8 fade-in">
          <div>
            <h1 className="text-3xl font-bold text-gray-900 dark:text-white flex items-center">
              👋 蘇秘書，歡迎回來
            </h1>
            <p className="mt-2 text-gray-600 dark:text-gray-400">
              這裡整理了協會行政作業的一致性流程。若您是新任，建議先閱讀「<a href="#" onClick={(e)=>{e.preventDefault(); setCurrentView('core_concepts');}} className="text-blue-500 hover:underline">工作核心觀念</a>」。
            </p>
          </div>

          <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-4">
            {QUICK_ACTIONS.map(action => (
              <button 
                key={action.id}
                onClick={() => setCurrentView(action.id)}
                className="flex flex-col items-center justify-center p-4 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl hover:shadow-md transition-all hover:-translate-y-1 hover:border-blue-300 dark:hover:border-blue-600 group"
              >
                <div className={`w-12 h-12 rounded-xl flex items-center justify-center mb-3 ${action.color}`}>
                  <i className={`${action.icon} text-xl`}></i>
                </div>
                <span className="text-sm font-medium text-gray-800 dark:text-gray-200 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">
                  {action.title}
                </span>
              </button>
            ))}
          </div>

          <div className="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 overflow-hidden shadow-sm">
            <div className="px-6 py-4 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between bg-gray-50/50 dark:bg-gray-800/50">
              <h2 className="text-lg font-semibold text-gray-900 dark:text-white flex items-center">
                <i className="fa-solid fa-clock-rotate-left mr-2 text-gray-400"></i>
                最近使用的 SOP
              </h2>
            </div>
            <ul className="divide-y divide-gray-100 dark:divide-gray-800">
              {RECENT_DOCS.map((doc, idx) => (
                <li key={idx} onClick={() => setCurrentView(doc.id)} className="px-6 py-4 hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors cursor-pointer flex items-center justify-between group">
                  <div className="flex items-center">
                    <i className={`${doc.icon} w-5 text-center text-gray-400 mr-3 group-hover:text-blue-500 transition-colors`}></i>
                    <span className="text-sm font-medium text-gray-700 dark:text-gray-300 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">{doc.title}</span>
                  </div>
                  <div className="flex items-center text-sm text-gray-400">
                    <i className="fa-regular fa-clock mr-1.5"></i>
                    {doc.time}
                  </div>
                </li>
              ))}
            </ul>
          </div>
        </div>
      );

      // --- 共用的 SOP 排版元件 (Notion 風格) ---
      const SOPLayout = ({ title, breadcrumbs = [], lastUpdated, tags = [], children }) => (
        <div className="max-w-4xl mx-auto fade-in pb-20">
          <div className="flex items-center text-sm text-gray-500 mb-6 print:hidden">
            <button onClick={() => setCurrentView('home')} className="hover:text-gray-900 dark:hover:text-white">首頁</button>
            <i className="fa-solid fa-chevron-right text-xs mx-2"></i>
            {breadcrumbs.map((b, i) => (
              <React.Fragment key={i}>
                <button onClick={() => setCurrentView(b.id)} className="hover:text-gray-900 dark:hover:text-white">{b.label}</button>
                <i className="fa-solid fa-chevron-right text-xs mx-2"></i>
              </React.Fragment>
            ))}
            <span className="text-gray-900 dark:text-white font-medium">{title}</span>
          </div>

          <article className="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 p-6 sm:p-12 relative">
            <div className="absolute top-6 right-6 sm:top-8 sm:right-8 flex space-x-2 print:hidden">
               <button 
                onClick={handlePrint}
                className="w-10 h-10 flex items-center justify-center text-gray-500 hover:text-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700 dark:hover:text-gray-300 rounded-lg transition-colors border border-transparent hover:border-gray-200 dark:hover:border-gray-600"
                title="列印或匯出PDF"
              >
                <i className="fa-solid fa-print text-lg"></i>
              </button>
            </div>

            <h1 className="text-3xl sm:text-4xl font-extrabold text-gray-900 dark:text-white mb-4 pr-12">{title}</h1>
            
            <div className="flex flex-wrap items-center gap-4 mb-8 text-sm text-gray-500 dark:text-gray-400 border-b border-gray-100 dark:border-gray-700 pb-6">
              <div className="flex items-center">
                <div className="w-6 h-6 rounded-full bg-blue-500 text-white flex items-center justify-center mr-2 text-xs font-bold shadow-sm">V1</div>
                最後更新：{lastUpdated}
              </div>
              {tags.map((tag, i) => (
                <div key={i} className="flex items-center text-gray-600 dark:text-gray-300 bg-gray-100 dark:bg-gray-700 px-3 py-1 rounded-full font-medium text-xs">
                  {tag}
                </div>
              ))}
            </div>

            <div className="space-y-8 text-base leading-relaxed">
              {children}
            </div>
          </article>
        </div>
      );

      // Section 樣式元件
      const SectionTitle = ({ children }) => (
        <h2 className="text-2xl font-bold text-gray-800 dark:text-gray-100 border-l-4 border-blue-500 pl-4 mb-4 mt-8">{children}</h2>
      );
      
      const SubTitle = ({ children }) => (
        <h3 className="text-xl font-bold text-gray-700 dark:text-gray-200 mt-6 mb-3 flex items-center">
          <i className="fa-solid fa-angle-right text-sm text-blue-500 mr-2"></i>{children}
        </h3>
      );

      const AlertBox = ({ icon = "fa-lightbulb", color = "blue", title, children }) => {
        const colorClasses = {
          blue: "bg-blue-50 dark:bg-blue-900/20 border-blue-100 dark:border-blue-800/50 text-blue-800 dark:text-blue-300",
          yellow: "bg-yellow-50 dark:bg-yellow-900/20 border-yellow-100 dark:border-yellow-800/50 text-yellow-800 dark:text-yellow-300",
          red: "bg-red-50 dark:bg-red-900/20 border-red-100 dark:border-red-800/50 text-red-800 dark:text-red-300",
        };
        return (
          <div className={`rounded-xl p-5 border shadow-sm ${colorClasses[color]}`}>
            <h4 className="font-bold flex items-center mb-2">
              <i className={`fa-solid ${icon} text-xl mr-2`}></i> {title}
            </h4>
            <div className="m-0 text-sm sm:text-base opacity-90">
              {children}
            </div>
          </div>
        );
      };

      const BulletList = ({ items, type="dot" }) => (
        <ul className="space-y-2 text-gray-700 dark:text-gray-300 ml-2">
          {items.map((item, i) => (
            <li key={i} className="flex items-start">
              {type === 'dot' ? (
                <span className="w-1.5 h-1.5 rounded-full bg-blue-400 mt-2 mr-3 flex-shrink-0"></span>
              ) : type === 'check' ? (
                <i className="fa-solid fa-check text-green-500 mt-1 mr-3 flex-shrink-0"></i>
              ) : (
                <i className="fa-solid fa-caret-right text-blue-500 mt-1 mr-3 flex-shrink-0"></i>
              )}
              <span>{item}</span>
            </li>
          ))}
        </ul>
      );


      // --- 各篇 SOP 的內容 ---

      const CoreConceptsView = () => (
        <SOPLayout title="工作核心觀念與工具" lastUpdated="今天" tags={["必讀", "系統觀念"]}>
          <p className="text-lg text-gray-600 dark:text-gray-400 border-b border-gray-100 dark:border-gray-700 pb-4">
            目的：協助新任秘書快速了解工作內容，降低交接成本，維持協會行政作業一致性。
          </p>

          <SectionTitle>工作核心觀念</SectionTitle>
          <SubTitle>一、先找範本，再開始做</SubTitle>
          <p className="text-gray-700 dark:text-gray-300 mb-3">協會大部分行政工作都有歷年範本可參考。開始任何工作前，請先至工作硬碟或雲端硬碟尋找歷年資料，不需自行從零開始製作。</p>
          <div className="bg-gray-50 dark:bg-gray-700/30 p-4 rounded-lg mb-6 border border-gray-200 dark:border-gray-700">
            <strong>工作原則：</strong>
            <BulletList type="arrow" items={[
              "沿用歷年格式。",
              "更新本次資料。",
              "若有新需求，再依當屆會長及秘書長指示調整。",
              "範本是基礎，指示是依據。"
            ]} />
          </div>

          <SubTitle>二、有疑問先詢問</SubTitle>
          <p className="text-gray-700 dark:text-gray-300 mb-2">若遇到無法判斷的事項：</p>
          <BulletList items={["先詢問群組。", "或請示秘書長、會長。", "不要自行決定或承諾。"]} />

          <SubTitle>三、資料同步更新</SubTitle>
